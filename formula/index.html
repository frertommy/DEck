<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JOJO Engineering Blueprints</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #061a2f;
    min-height: 100vh;
    color: #d8e6f3;
    font-family: "Oswald", sans-serif;
  }
  .scene {
    min-height: 100vh;
    padding: 60px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .frame {
    max-width: 1400px;
    width: 100%;
    background:
      linear-gradient(rgba(120, 160, 200, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120, 160, 200, 0.04) 1px, transparent 1px),
      #0a2748;
    background-size: 40px 40px, 40px 40px;
    border: 1.5px solid #d8e6f3;
    padding: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    position: relative;
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 0.5px solid rgba(216, 230, 243, 0.3);
    pointer-events: none;
  }
  .corner {
    position: absolute;
    width: 14px; height: 14px;
    border: 1.5px solid #d8e6f3;
  }
  .corner.tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
  .corner.tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
  .corner.br { bottom: 8px; right: 8px; border-left: none; border-top: none; }

  /* ============ NAV SWITCHER ============ */
  .dwg-nav {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border: 1px solid #d8e6f3;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
  }
  .dwg-nav button {
    background: transparent;
    border: none;
    border-right: 0.5px solid rgba(216, 230, 243, 0.4);
    color: #d8e6f3;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .dwg-nav button:last-child { border-right: none; }
  .dwg-nav button:hover { background: rgba(216, 230, 243, 0.06); }
  .dwg-nav button:focus-visible {
    outline: 1px solid #d8e6f3;
    outline-offset: -3px;
  }
  .dwg-nav button.active {
    background: #d8e6f3;
    color: #061a2f;
  }
  .dwg-nav .num {
    font-family: "Oswald", sans-serif;
    font-size: 10px;
    letter-spacing: 0.28em;
    font-weight: 400;
    opacity: 0.7;
    text-transform: uppercase;
  }
  .dwg-nav button.active .num { opacity: 0.6; }
  .dwg-nav .title {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* ============ DRAWING HEADER ============ */
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 0.5px solid #d8e6f3;
  }
  .header h1 {
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-style: italic;
    font-size: 28px;
    color: #d8e6f3;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-family: "Oswald", sans-serif;
    font-weight: 300;
    font-size: 11px;
    color: #d8e6f3;
    letter-spacing: 0.3em;
    text-align: right;
  }
  .header .meta div + div { margin-top: 4px; opacity: 0.7; }

  .body svg { width: 100%; height: auto; display: block; }

  /* ============ TITLEBLOCK ============ */
  .titleblock {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    margin-top: 20px;
    border: 1px solid #d8e6f3;
    font-family: "Oswald", sans-serif;
    color: #d8e6f3;
  }
  .titleblock > div {
    padding: 10px 14px;
    border-right: 0.5px solid rgba(216, 230, 243, 0.4);
  }
  .titleblock > div:last-child { border-right: none; }
  .titleblock .lbl {
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: rgba(216, 230, 243, 0.55);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .titleblock .val {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.05em;
  }
  .titleblock .val.serif {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 17px;
  }

  .bp-line { stroke: #d8e6f3; fill: none; stroke-width: 1; }
  .bp-line-thin { stroke: #d8e6f3; fill: none; stroke-width: 0.5; }
  .bp-text { fill: #d8e6f3; font-family: "Oswald", sans-serif; }
  .bp-text-serif { fill: #d8e6f3; font-family: "Cormorant Garamond", serif; font-style: italic; }
</style>
</head>

</div>

      "2": "JOJO · Index Composition",
      "3": "JOJO · ΔB Detail"
    };

    function showDrawing(id) {
      var template = document.getElementById("tpl-" + id);
      if (!template) return;
      var content = document.getElementById("dwg-content");
      // Clear and inject from the template
      content.innerHTML = "";
      content.appendChild(template.content.cloneNode(true));

      // Update active button state
      var buttons = document.querySelectorAll(".dwg-nav button");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.toggle("active", buttons[i].dataset.target === String(id));
      }

      // Update document title
      if (titleByTarget[id]) document.title = titleByTarget[id];

      // Update URL hash without scrolling (best-effort; sandboxed iframes block this)
      try {
        if (history && history.replaceState) {
          history.replaceState(null, "", "#dwg-" + id);
        }
      } catch (err) { /* about:srcdoc and similar sandboxes — ignore */ }
    }

    document.querySelectorAll(".dwg-nav button").forEach(function (b) {
      b.addEventListener("click", function () { showDrawing(b.dataset.target); });
    });

    // Keyboard navigation: ← / → switch drawings
    document.addEventListener("keydown", function (e) {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
      var current = 1;
      var btns = document.querySelectorAll(".dwg-nav button");
      for (var i = 0; i < btns.length; i++) {
        if (btns[i].classList.contains("active")) { current = parseInt(btns[i].dataset.target, 10); break; }
      }
      if (e.key === "ArrowRight") {
        var next = current === 3 ? 1 : current + 1;
        showDrawing(next);
      } else if (e.key === "ArrowLeft") {
        var prev = current === 1 ? 3 : current - 1;
        showDrawing(prev);
      }
    });

    // Honor #dwg-N hash on load (best-effort)
    var initial = "1";
    try {
      var hash = window.location.hash || "";
      var match = hash.match(/^#dwg-([123])$/);
      if (match) initial = match[1];
    } catch (err) { /* ignore */ }
    showDrawing(initial);
  })();
</script>

</body>
</html>
